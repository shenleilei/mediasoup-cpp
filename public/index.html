<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mediasoup-cpp SFU Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:sans-serif; background:#1a1a2e; color:#eee; padding:20px; }
h1 { margin-bottom:10px; font-size:1.4em; }
#status { color:#0f0; margin-bottom:15px; }
.controls { margin-bottom:15px; }
button { padding:8px 16px; margin:4px; border:none; border-radius:4px; cursor:pointer; font-size:14px; }
button:disabled { opacity:0.5; cursor:default; }
#joinBtn { background:#4CAF50; color:#fff; }
#publishBtn { background:#2196F3; color:#fff; }
.videos { display:flex; flex-wrap:wrap; gap:10px; }
.video-box { background:#000; border-radius:8px; overflow:hidden; position:relative; }
.video-box video { width:320px; height:240px; object-fit:cover; }
.video-box .label { position:absolute; bottom:5px; left:5px; background:rgba(0,0,0,0.7); padding:2px 8px; border-radius:4px; font-size:12px; }
#log { margin-top:15px; background:#0d0d1a; padding:10px; border-radius:4px; height:200px; overflow-y:auto; font-family:monospace; font-size:12px; white-space:pre-wrap; }
</style>
</head>
<body>
<h1>mediasoup-cpp SFU Test</h1>
<div id="status">Disconnected</div>
<div class="controls">
  <input id="roomInput" placeholder="Room ID" value="test-room" style="padding:8px;border-radius:4px;border:1px solid #555;background:#2a2a3e;color:#eee;">
  <button id="joinBtn" onclick="join()">Join Room</button>
  <button id="publishBtn" onclick="publish()" disabled>Publish A/V</button>
</div>
<div class="videos" id="videos">
  <div class="video-box">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="label">Local</div>
  </div>
</div>
<div id="log"></div>

<script src="/mediasoup-client.bundle.js"></script>
<script>
try {
  const ortc = require('mediasoup-client/lib/ortc');
  if (ortc && ortc.canConsume) ortc.canConsume = function() { return true; };
} catch(e) {}
</script>
<script>
const log = (msg) => { const el=document.getElementById('log'); el.textContent+=new Date().toLocaleTimeString()+' '+msg+'\n'; el.scrollTop=el.scrollHeight; console.log(msg); };
const setStatus = (s,c) => { const el=document.getElementById('status'); el.textContent=s; el.style.color=c||'#0f0'; };

let ws, device, sendTransport, recvTransport, reqId=0;
const pending = {};
let currentRoomId, currentPeerId;

// P4: auto-reconnect state
let reconnectAttempts = 0;
const MAX_RECONNECT = 10;
let shouldReconnect = false;

function wsRequest(method, data={}) {
  return new Promise((resolve, reject) => {
    const id = ++reqId;
    pending[id] = {resolve, reject};
    ws.send(JSON.stringify({request:true, id, method, data}));
    setTimeout(() => { if(pending[id]) { delete pending[id]; reject(new Error('timeout')); } }, 10000);
  });
}

function connectWs(url) {
  return new Promise((resolve, reject) => {
    ws = new WebSocket(url);
    ws.onopen = () => { reconnectAttempts = 0; resolve(); };
    ws.onerror = () => reject(new Error('WS connect failed'));
    ws.onclose = () => {
      setStatus('Disconnected', '#f00');
      if (shouldReconnect && reconnectAttempts < MAX_RECONNECT) {
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;
        log(`Reconnecting in ${delay}ms (attempt ${reconnectAttempts})...`);
        setTimeout(() => doReconnect(url), delay);
      }
    };
    ws.onmessage = handleMessage;
  });
}

async function doReconnect(url) {
  try {
    await connectWs(url);
    setStatus('Reconnected, rejoining...');
    let joinResp = await wsRequest('join', {roomId: currentRoomId, peerId: currentPeerId});
    if (!joinResp) joinResp = await wsRequest('join', {roomId: currentRoomId, peerId: currentPeerId});
    log('Rejoined room after reconnect');

    // Recreate recvTransport + consume existing producers
    if (device) {
      // Clear stale remote videos
      document.querySelectorAll('.video-box:not(:first-child)').forEach(el => el.remove());

      const rData = await wsRequest('createWebRtcTransport', {producing:false, consuming:true});
      recvTransport = device.createRecvTransport(rData);
      recvTransport.on('connect', async ({dtlsParameters}, cb, eb) => {
        try { await wsRequest('connectWebRtcTransport', {transportId:recvTransport.id, dtlsParameters}); cb(); }
        catch(e) { eb(e); }
      });
      for (const c of (rData.consumers || [])) await handleNewConsumer(c);
    }

    // Recreate sendTransport and re-produce if we had tracks
    const stream = document.getElementById('localVideo').srcObject;
    if (stream && device) {
      const tData = await wsRequest('createWebRtcTransport', {producing:true, consuming:false});
      sendTransport = device.createSendTransport(tData);
      sendTransport.on('connect', async ({dtlsParameters}, cb, eb) => {
        try { await wsRequest('connectWebRtcTransport', {transportId:sendTransport.id, dtlsParameters}); cb(); }
        catch(e) { eb(e); }
      });
      sendTransport.on('produce', async ({kind, rtpParameters}, cb, eb) => {
        try { const r = await wsRequest('produce', {transportId:sendTransport.id, kind, rtpParameters}); cb({id:r.id}); }
        catch(e) { eb(e); }
      });
      for (const track of stream.getTracks()) await sendTransport.produce({track});
    }

    setStatus('In room: ' + currentRoomId);
  } catch(e) {
    log('Reconnect failed: ' + e.message);
  }
}

function handleMessage(ev) {
  const msg = JSON.parse(ev.data);
  if (msg.response) {
    const p = pending[msg.id];
    if (p) {
      delete pending[msg.id];
      if (msg.redirect) {
        // P3: redirect to correct node
        log('Redirecting to ' + msg.redirect);
        ws.close();
        connectWs(msg.redirect).then(() => {
          p.resolve(null); // caller will re-join
        }).catch(p.reject);
        return;
      }
      msg.ok ? p.resolve(msg.data) : p.reject(new Error(msg.error));
    }
  } else if (msg.notification) {
    handleNotification(msg);
  }
}

function handleNotification(msg) {
  log('Notification: ' + msg.method);
  if (msg.method === 'newConsumer') {
    // P1: server-driven auto-subscribe — consumer already created server-side
    handleNewConsumer(msg.data);
  } else if (msg.method === 'newProducer') {
    // Legacy fallback: consume manually if server didn't auto-subscribe
    consumeProducer(msg.data.producerId, msg.data.kind);
  } else if (msg.method === 'peerJoined') {
    log('Peer joined: ' + msg.data.peerId);
  } else if (msg.method === 'peerLeft') {
    log('Peer left: ' + msg.data.peerId);
  }
}

async function handleNewConsumer(data) {
  if (!recvTransport) {
    log('No recvTransport yet, queuing newConsumer');
    window._pendingConsumers = window._pendingConsumers || [];
    window._pendingConsumers.push(data);
    return;
  }
  try {
    const consumer = await recvTransport.consume({
      id: data.id,
      producerId: data.producerId,
      kind: data.kind,
      rtpParameters: data.rtpParameters,
      appData: {}
    });

    const el = document.createElement(consumer.kind === 'video' ? 'video' : 'audio');
    el.autoplay = true; el.playsinline = true;
    el.srcObject = new MediaStream([consumer.track]);
    el.play().catch(()=>{});

    if (consumer.kind === 'video') {
      const box = document.createElement('div');
      box.className = 'video-box';
      box.appendChild(el);
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = 'Remote ' + data.kind + (data.peerId ? ' (' + data.peerId + ')' : '');
      box.appendChild(label);
      document.getElementById('videos').appendChild(box);
    }
    log('Auto-subscribed ' + data.kind + ' from ' + (data.peerId || data.producerId));
  } catch(e) {
    log('newConsumer error: ' + e.message);
  }
}

async function join() {
  const roomId = document.getElementById('roomInput').value || 'test-room';
  const peerId = 'peer-' + Math.random().toString(36).substr(2,6);
  currentRoomId = roomId;
  currentPeerId = peerId;

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.hostname}:${location.port||3000}/ws`;

  log('Connecting...');
  try {
    await connectWs(wsUrl);
  } catch(e) {
    log('Connect failed: ' + e.message);
    setStatus('Connect failed', '#f00');
    return;
  }

  shouldReconnect = true;
  setStatus('Connected');

  try {
    let joinResp = await wsRequest('join', {roomId, peerId});

    // If redirected, rejoin on new connection
    if (!joinResp) {
      joinResp = await wsRequest('join', {roomId, peerId});
    }

    log('Joined room: ' + roomId);

    device = new mediasoupClient.Device();
    await device.load({routerRtpCapabilities: joinResp.routerRtpCapabilities});
    log('Device loaded');

    // Create recvTransport immediately so we can receive others' media
    const rData = await wsRequest('createWebRtcTransport', {producing:false, consuming:true});
    const pendingServerConsumers = rData.consumers || [];
    recvTransport = device.createRecvTransport(rData);
    recvTransport.on('connect', async ({dtlsParameters}, cb, eb) => {
      try { await wsRequest('connectWebRtcTransport', {transportId:recvTransport.id, dtlsParameters}); cb(); }
      catch(e) { eb(e); }
    });
    log('Recv transport ready, server pre-created ' + pendingServerConsumers.length + ' consumers');

    // Consume server-side pre-created consumers (existing producers in room)
    for (const c of pendingServerConsumers) {
      log('Consuming pre-created: ' + c.kind + ' from ' + c.peerId);
      await handleNewConsumer(c);
    }

    // Consume existing producers not already handled by pre-created consumers
    const consumedProducerIds = new Set(pendingServerConsumers.map(c => c.producerId));
    for (const p of (joinResp.existingProducers || [])) {
      if (consumedProducerIds.has(p.producerId)) continue;
      log('Consuming existing: ' + p.producerId);
      await consumeProducer(p.producerId, p.kind);
    }

    // Process any queued newConsumer notifications
    if (window._pendingConsumers) {
      for (const c of window._pendingConsumers) await handleNewConsumer(c);
      window._pendingConsumers = [];
    }

    document.getElementById('publishBtn').disabled = false;
    setStatus('In room: ' + roomId);
  } catch(e) {
    log('ERROR: ' + e.message);
    setStatus('Error', '#f00');
  }
}

async function publish() {
  try {
    log('Getting user media...');
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
    } catch(e) {
      log('Camera not available, using fake stream');
      const canvas = document.createElement('canvas');
      canvas.width = 640; canvas.height = 480;
      const ctx = canvas.getContext('2d');
      let frame = 0;
      setInterval(() => {
        frame++;
        ctx.fillStyle = `hsl(${frame*3%360},70%,50%)`;
        ctx.fillRect(0,0,640,480);
        ctx.fillStyle='#fff'; ctx.font='bold 40px sans-serif';
        ctx.fillText('mediasoup-cpp SFU', 120, 220);
        ctx.font='30px sans-serif';
        ctx.fillText('Frame: ' + frame, 220, 280);
        ctx.fillText(new Date().toLocaleTimeString(), 200, 330);
      }, 66);
      stream = canvas.captureStream(15);
      const ac = new AudioContext();
      const osc = ac.createOscillator();
      const dest = ac.createMediaStreamDestination();
      osc.connect(dest); osc.start();
      stream.addTrack(dest.stream.getAudioTracks()[0]);
    }
    document.getElementById('localVideo').srcObject = stream;

    // Send transport
    const tData = await wsRequest('createWebRtcTransport', {producing:true, consuming:false});
    sendTransport = device.createSendTransport(tData);
    sendTransport.on('connect', async ({dtlsParameters}, cb, eb) => {
      try { await wsRequest('connectWebRtcTransport', {transportId:sendTransport.id, dtlsParameters}); cb(); }
      catch(e) { eb(e); }
    });
    sendTransport.on('produce', async ({kind, rtpParameters}, cb, eb) => {
      try { const r = await wsRequest('produce', {transportId:sendTransport.id, kind, rtpParameters}); cb({id:r.id}); }
      catch(e) { eb(e); }
    });

    for (const track of stream.getTracks()) {
      const producer = await sendTransport.produce({track});
      log('Producing ' + track.kind + ' [' + producer.id + ']');
    }

    setStatus('Publishing A/V');
    document.getElementById('publishBtn').disabled = true;

    // Process any newConsumer notifications that arrived during produce
    if (window._pendingConsumers) {
      for (const c of window._pendingConsumers) await handleNewConsumer(c);
      window._pendingConsumers = [];
    }

  } catch(e) {
    log('ERROR: ' + e.message);
    setStatus('Error', '#f00');
  }
}

async function consumeProducer(producerId, kind) {
  if (!recvTransport) return;
  try {
    const resp = await wsRequest('consume', {
      transportId: recvTransport.id, producerId,
      rtpCapabilities: device.rtpCapabilities
    });

    const consumer = await recvTransport.consume({
      id: resp.id, producerId: resp.producerId,
      kind: resp.kind || kind, rtpParameters: resp.rtpParameters, appData: {}
    });

    const el = document.createElement(consumer.kind === 'video' ? 'video' : 'audio');
    el.autoplay = true; el.playsinline = true;
    el.srcObject = new MediaStream([consumer.track]);
    el.play().catch(()=>{});

    if (consumer.kind === 'video') {
      const box = document.createElement('div');
      box.className = 'video-box';
      box.appendChild(el);
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = 'Remote ' + (resp.kind || kind);
      box.appendChild(label);
      document.getElementById('videos').appendChild(box);
    }
    log('Consuming ' + (resp.kind||kind) + ' from ' + producerId);
  } catch(e) {
    log('Consume error: ' + e.message);
  }
}
</script>
</body>
</html>

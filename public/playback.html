<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Recording Playback + QoS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#eee; font-family:sans-serif; padding:20px; }
h1 { font-size:1.3em; margin-bottom:15px; }
#room-list { margin-bottom:20px; }
.room-group { margin-bottom:12px; }
.room-group h3 { color:#4CAF50; font-size:0.95em; margin-bottom:4px; }
.file-link { color:#2196F3; cursor:pointer; margin-right:15px; font-size:0.9em; }
.file-link:hover { text-decoration:underline; }
#player-area { display:none; }
video { max-width:640px; background:#000; border-radius:6px; }
#qos-timeline { margin-top:15px; background:#0d0d1a; border:1px solid #333; border-radius:8px; padding:15px; }
#qos-timeline h2 { font-size:1.1em; margin-bottom:10px; color:#4CAF50; }
.qos-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:6px; font-size:12px; }
.qos-item { background:#222; padding:4px 8px; border-radius:4px; }
.qos-item .label { color:#888; }
.qos-item .value { color:#eee; font-family:monospace; }
.score-bar { margin-top:10px; }
.score-bar canvas { width:100%; height:40px; border-radius:4px; background:#1a1a2e; }
#no-qos { color:#888; font-size:13px; }
</style>
</head><body>
<h1>📼 Recording Playback</h1>
<div id="room-list">Loading recordings...</div>
<div id="player-area">
  <video id="video" controls></video>
  <div id="qos-timeline">
    <h2>📡 QoS at current time</h2>
    <div id="qos-content"><span id="no-qos">No QoS data</span></div>
    <div class="score-bar"><canvas id="score-canvas" height="40"></canvas></div>
  </div>
</div>

<script>
let qosData = [];
let video = document.getElementById('video');

// Load recording list
fetch('/api/recordings').then(r => r.json()).then(rooms => {
  let el = document.getElementById('room-list');
  if (!rooms.length) { el.textContent = 'No recordings found.'; return; }
  el.innerHTML = '';
  for (let room of rooms) {
    let div = document.createElement('div');
    div.className = 'room-group';
    div.innerHTML = '<h3>Room: ' + room.roomId + '</h3>';
    for (let f of room.files) {
      let a = document.createElement('span');
      a.className = 'file-link';
      a.textContent = f;
      a.onclick = () => loadRecording(room.roomId, f);
      div.appendChild(a);
    }
    el.appendChild(div);
  }
});

function loadRecording(roomId, filename) {
  document.getElementById('player-area').style.display = 'block';
  video.src = '/recordings/' + roomId + '/' + filename;

  // Load QoS sidecar
  let qosFile = filename.replace('.webm', '.qos.json');
  qosData = [];
  fetch('/recordings/' + roomId + '/' + qosFile)
    .then(r => r.ok ? r.json() : [])
    .then(data => {
      qosData = data || [];
      if (qosData.length) drawScoreTimeline();
      else document.getElementById('no-qos').textContent = 'No QoS data for this recording';
    })
    .catch(() => { qosData = []; });
}

video.addEventListener('timeupdate', () => {
  if (!qosData.length) return;
  let t = video.currentTime;
  // Find closest snapshot
  let best = qosData[0];
  for (let s of qosData) {
    if (s.t <= t) best = s;
    else break;
  }
  renderSnapshot(best.stats);
  drawPlayhead(t);
});

function fmtBitrate(bps) {
  if (!bps && bps !== 0) return '-';
  if (bps >= 1000000) return (bps/1000000).toFixed(1) + ' Mbps';
  if (bps >= 1000) return (bps/1000).toFixed(0) + ' kbps';
  return bps + ' bps';
}
function qosItem(label, value) {
  return '<div class="qos-item"><span class="label">' + label + '</span> <span class="value">' + value + '</span></div>';
}

function renderSnapshot(stats) {
  let el = document.getElementById('qos-content');
  if (!stats) { el.innerHTML = '<span style="color:#888">-</span>'; return; }
  let html = '';

  // sendTransport
  let st = stats.sendTransport;
  if (st && typeof st === 'object' && Object.keys(st).length) {
    html += '<div style="margin:4px 0;color:#4CAF50;font-size:12px;font-weight:bold">⬆ Uplink</div>';
    html += '<div class="qos-grid">';
    html += qosItem('Recv Bitrate', fmtBitrate(st.rtpRecvBitrate));
    html += qosItem('Available BW', fmtBitrate(st.availableIncomingBitrate));
    html += qosItem('Packet Loss', st.rtpPacketLossReceived != null ? (st.rtpPacketLossReceived * 100).toFixed(1) + '%' : '-');
    html += qosItem('ICE', st.iceState || '-');
    html += qosItem('DTLS', st.dtlsState || '-');
    html += '</div>';
  }

  // Producers
  let prods = stats.producers || {};
  for (let pid in prods) {
    let p = prods[pid];
    html += '<div style="margin:4px 0;color:#2196F3;font-size:12px;font-weight:bold">📹 ' + (p.kind||'?') + '</div>';
    html += '<div class="qos-grid">';
    if (p.scores) for (let s of p.scores) html += qosItem('Score (SSRC ' + s.ssrc + ')', s.score + '/10');
    if (p.stats && p.stats[0]) {
      let s = p.stats[0];
      html += qosItem('Bitrate', fmtBitrate(s.bitrate));
      html += qosItem('Jitter', s.jitter != null ? s.jitter + ' ms' : '-');
      html += qosItem('RTT', s.roundTripTime != null ? s.roundTripTime.toFixed(1) + ' ms' : '-');
      html += qosItem('Pkt Lost', s.packetsLost != null ? s.packetsLost : '-');
      html += qosItem('NACK', s.nackCount != null ? s.nackCount : '-');
      html += qosItem('PLI', s.pliCount != null ? s.pliCount : '-');
    }
    html += '</div>';
  }

  // recvTransport
  let rt = stats.recvTransport;
  if (rt && typeof rt === 'object' && Object.keys(rt).length) {
    html += '<div style="margin:4px 0;color:#FF9800;font-size:12px;font-weight:bold">⬇ Downlink</div>';
    html += '<div class="qos-grid">';
    html += qosItem('Send Bitrate', fmtBitrate(rt.rtpSendBitrate));
    html += '</div>';
  }

  el.innerHTML = html || '<span style="color:#888">No data at this time</span>';
}

function drawScoreTimeline() {
  let canvas = document.getElementById('score-canvas');
  let ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 80;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!qosData.length) return;
  let maxT = qosData[qosData.length - 1].t || 1;

  for (let i = 0; i < qosData.length; i++) {
    let s = qosData[i];
    let x = (s.t / maxT) * canvas.width;
    let nextT = (i + 1 < qosData.length) ? qosData[i+1].t : maxT;
    let w = Math.max(((nextT - s.t) / maxT) * canvas.width, 2);

    // Get worst producer score
    let score = 10;
    let prods = s.stats && s.stats.producers || {};
    for (let pid in prods) {
      let p = prods[pid];
      if (p.scores) for (let sc of p.scores) score = Math.min(score, sc.score);
    }

    let color = score >= 7 ? '#4CAF50' : score >= 4 ? '#FF9800' : '#f44336';
    ctx.fillStyle = color;
    ctx.fillRect(x, canvas.height - (score / 10) * canvas.height, w, (score / 10) * canvas.height);
  }
}

function drawPlayhead(t) {
  let canvas = document.getElementById('score-canvas');
  let ctx = canvas.getContext('2d');
  // Redraw timeline then playhead
  drawScoreTimeline();
  if (!qosData.length) return;
  let maxT = qosData[qosData.length - 1].t || 1;
  let x = (t / maxT) * canvas.width;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, 0);
  ctx.lineTo(x, canvas.height);
  ctx.stroke();
}
</script>
</body></html>

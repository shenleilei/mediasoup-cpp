name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libssl-dev zlib1g-dev libavformat-dev libavcodec-dev libavutil-dev libhiredis-dev curl

      - name: Generate flatbuffers headers
        run: |
          cmake -B third_party/flatbuffers/build -S third_party/flatbuffers -DCMAKE_BUILD_TYPE=Release -DFLATBUFFERS_BUILD_TESTS=OFF -DFLATBUFFERS_BUILD_FLATHASH=OFF
          cmake --build third_party/flatbuffers/build -j$(nproc) --target flatc
          mkdir -p generated
          for f in fbs/*.fbs; do
            third_party/flatbuffers/build/flatc --cpp -o generated --gen-object-api --scoped-enums "$f"
          done

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

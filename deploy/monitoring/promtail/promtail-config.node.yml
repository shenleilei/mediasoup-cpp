# SFU 节点用的 promtail 配置
# 使用前替换 <MONITOR_CENTER_IP> 为监控中心的内网 IP
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://<MONITOR_CENTER_IP>:3100/loki/api/v1/push

scrape_configs:
  - job_name: mediasoup-log
    static_configs:
      - targets: [localhost]
        labels:
          job: mediasoup-sfu
          host: ${HOSTNAME}
          __path__: /var/log/mediasoup-sfu.log

  - job_name: container-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          host: ${HOSTNAME}
          __path__: /var/lib/docker/containers/*/*.log
